services:
  postgres:
    image: postgres:16-alpine
    container_name: tuhui-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tuhui
      POSTGRES_PASSWORD: tuhui
      POSTGRES_DB: tuhui
    volumes:
      - tuhui_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tuhui -d tuhui']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tuhui_pg_data:
